<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MealsApp">
<meta name="theme-color" content="#C56A2E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>MealsApp</title>
<style>
:root{
  --bg:#FBF7F1; --card:#FFFFFF; --pri:#C56A2E; --pri-d:#A8521C; --green:#1F8A63;
  --fill:#F3EDE0; --sec:#F0E9DB; --tx:#2A2118; --tx2:#6B5D4A; --tx3:#9A8B70;
  --line:#F2EDE2; --hero1:#FBE6CB; --hero2:#F8DBB8; --chip:#F4EFE5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}

/* ── Sticky nav ── */
.sticky-nav{position:sticky;top:0;z-index:100;background:var(--bg);}
.app-header{padding:16px 18px 11px;}
.app-header-row{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:33px;height:33px;border-radius:9px;background:var(--pri);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 5px rgba(197,106,46,0.3);}
.brand-mark svg{width:18px;height:18px;}
.brand-txt{font-size:19px;font-weight:700;color:var(--tx);letter-spacing:-0.4px;}
.brand-txt .a{color:var(--pri);}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sync-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2);background:#F1EADD;border-radius:100px;padding:4px 9px 4px 8px;font-weight:600;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#C7B79C;transition:background .4s;flex-shrink:0;}
.sync-dot.online{background:var(--green);}
.sync-dot.syncing{background:#D98E3D;}
.sync-col{display:flex;flex-direction:column;align-items:flex-end;gap:0;line-height:1.2;}
#version-label{font-size:9px;color:var(--tx3);}
.bell-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--pri);display:flex;align-items:center;}
.bell-btn svg{width:20px;height:20px;}
.bell-btn:not(.enabled){color:#C7B79C;}
.bell-btn.unsupported{display:none;}

/* ── Tabs ── */
.tab-bar{display:flex;gap:5px;padding:0 16px 12px;}
.tab{padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--tx2);border:none;background:none;font-family:inherit;white-space:nowrap;border-radius:100px;transition:.15s;}
.tab.active{color:#fff;background:var(--pri);}
.badge{display:inline-flex;align-items:center;justify-content:center;background:#fff;color:var(--pri);font-size:10px;font-weight:800;border-radius:100px;min-width:17px;height:17px;padding:0 5px;margin-left:5px;}
.tab.active .badge{background:#fff;color:var(--pri);}
.tab:not(.active) .badge{background:var(--pri);color:#fff;}

.content{padding:2px 14px 30px;max-width:780px;margin:0 auto;}
.section-title{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:0.07em;margin:6px 6px 11px;}

/* ── Buttons ── */
.btn{padding:11px 18px;border-radius:13px;border:none;background:var(--sec);color:var(--tx2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn.primary{background:var(--pri);color:#fff;box-shadow:0 3px 10px rgba(197,106,46,0.25);}
.btn.primary:active{background:var(--pri-d);}
.btn.sm{padding:8px 13px;font-size:13px;}
.btn.danger-sm{padding:8px 13px;font-size:13px;color:#B5482E;background:#F7E3DC;}
.btn.icon-btn{width:30px;height:30px;padding:0;background:#F1EADD;color:#B59A7A;font-size:17px;display:inline-flex;align-items:center;justify-content:center;}
.btn-row{display:flex;gap:9px;margin-bottom:10px;}

/* ── Custom fields & selects (kein OS-Look) ── */
.field,input[type=text],input:not([type]),input[type=number]{background:var(--fill);border:none;border-radius:12px;padding:11px 13px;font-size:14px;color:var(--tx);font-family:inherit;width:100%;}
.field::placeholder,input::placeholder{color:var(--tx3);}
input:focus,.csel:focus{outline:2px solid rgba(197,106,46,0.35);}
.csel{position:relative;display:flex;align-items:center;gap:9px;background:var(--fill);border:none;border-radius:12px;padding:11px 34px 11px 13px;font-size:14px;color:var(--tx);font-weight:600;font-family:inherit;width:100%;text-align:left;cursor:pointer;}
.csel::after{content:'';position:absolute;right:14px;top:50%;width:8px;height:8px;border-right:2px solid var(--tx3);border-bottom:2px solid var(--tx3);transform:translateY(-65%) rotate(45deg);}
.csel .swatch{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.csel.compact{padding:10px 26px 10px 11px;font-size:13px;font-weight:500;}
.csel.compact::after{right:10px;}
/* native select fallback styled soft */
select{background:var(--fill);border:none;border-radius:12px;padding:11px 13px;font-size:14px;color:var(--tx);font-family:inherit;width:100%;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;charset=US-ASCII,%3Csvg width='10' height='7' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23A8987A' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;padding-right:34px;}

/* ── Week planner ── */
.week-section-header{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.07em;padding:14px 6px 9px;}
.week-section-header:first-child{padding-top:2px;}
#week-card{display:flex;flex-direction:column;gap:9px;}
.day-row{display:flex;align-items:center;gap:13px;padding:14px 15px;background:var(--card);border-radius:18px;box-shadow:0 2px 9px rgba(120,90,40,0.05);min-height:62px;transition:background .1s,box-shadow .1s;}
.day-row.is-today{background:linear-gradient(135deg,var(--hero1),var(--hero2));box-shadow:0 5px 18px rgba(197,106,46,0.18);}
.day-row.is-past{opacity:0.6;box-shadow:none;background:#F6F1E8;}
.day-row.drag-over{box-shadow:0 0 0 2px var(--pri);}
.drag-handle{width:22px;height:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#C7B79C;touch-action:none;}
.drag-handle svg{width:13px;height:13px;}
.day-row.no-plan .drag-handle{visibility:hidden;}
.day-date-col{flex-shrink:0;width:40px;text-align:center;}
.day-label{font-size:13px;font-weight:700;color:var(--tx2);}
.day-date{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;font-weight:700;}
.is-today .day-label{color:var(--pri-d);}
.is-today .day-date{color:#C58A4B;}
.day-content{flex:1;min-width:0;cursor:pointer;}
.meal-line{display:flex;align-items:center;gap:9px;}
.meal-line+.meal-line{margin-top:5px;}
.meal-dot{width:8px;height:8px;border-radius:50%;background:#C2B49A;flex-shrink:0;}
.meal-line.second .meal-dot{width:7px;height:7px;}
.meal-name-text{font-size:15px;font-weight:600;color:var(--tx);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;}
.meal-line.second .meal-name-text{font-size:14px;font-weight:500;color:var(--tx2);}
.day-special{font-size:15px;font-weight:600;color:var(--tx2);display:flex;align-items:center;gap:9px;}
.day-special-sub{font-size:11px;color:var(--tx3);margin-top:3px;padding-left:28px;}
.day-empty{font-size:14px;color:var(--tx3);}
.day-action{flex-shrink:0;}
.day-actions-col{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.btn-add{width:34px;height:34px;border-radius:50%;background:#FBEFE0;color:var(--pri);font-size:21px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;}
.is-today .btn-add{background:#fff;}
.btn-remove{width:30px;height:30px;border-radius:50%;border:none;background:#F1EADD;color:#B59A7A;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;}
.btn-list-action{padding:6px 11px;border-radius:100px;border:none;background:var(--green);color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-list-action.in-list{background:#F1EADD;color:#8A7355;}
.btn-eaten{padding:6px 11px;border-radius:100px;border:none;background:#F1EADD;color:#8A7355;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.is-today .btn-eaten{background:#fff;color:var(--pri);}
.drag-ghost{position:fixed;left:14px;right:14px;background:var(--card);border-radius:18px;box-shadow:0 12px 30px rgba(90,65,30,0.22);pointer-events:none;z-index:500;opacity:0.97;transform:scale(1.02);}

/* ── Bottom sheet ── */
.overlay{position:fixed;inset:0;background:rgba(45,30,15,0.42);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--bg);width:100%;border-radius:24px 24px 0 0;max-height:88vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 30px rgba(0,0,0,0.16);}
.overlay.open .sheet{transform:translateY(0);}
.grabber{width:38px;height:4px;background:#D9D0BF;border-radius:2px;margin:9px auto 2px;flex-shrink:0;}
.sheet-header{padding:8px 20px 14px;border-bottom:1px solid #EDE5D6;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;gap:12px;}
.sheet-close{background:var(--sec);color:var(--tx2);border:none;border-radius:100px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;}
.sheet-title{font-size:18px;font-weight:700;}
.sheet-subtitle{font-size:13px;color:var(--tx3);margin-top:2px;}
.sheet-body{overflow-y:auto;padding:13px 16px 8px;flex:1;}
.sheet-footer{padding:13px 16px 18px;border-top:1px solid #EDE5D6;flex-shrink:0;display:flex;gap:10px;}
.btn-confirm{flex:1;padding:14px;border-radius:14px;background:var(--pri);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(197,106,46,0.28);}
.btn-confirm:active{background:var(--pri-d);}
.btn-cancel{padding:14px 20px;border-radius:14px;background:var(--sec);color:var(--tx2);border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.special-btn{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:14px;border:1.5px solid transparent;background:var(--card);width:100%;text-align:left;cursor:pointer;font-family:inherit;margin-bottom:8px;box-shadow:0 2px 8px rgba(120,90,40,0.05);}
.special-btn.selected{border-color:var(--pri);background:#FCEFDC;}
.special-icon{font-size:23px;width:30px;text-align:center;flex-shrink:0;}
.special-label{font-size:15px;font-weight:700;color:var(--tx);}
.special-sub{font-size:12px;color:var(--tx2);margin-top:1px;}
.special-check{margin-left:auto;color:var(--pri);font-size:18px;font-weight:800;}
.sheet-section-label{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:0.06em;padding:14px 4px 9px;}
.sheet-folder-header{display:flex;align-items:center;gap:11px;padding:13px 14px;background:var(--card);border-radius:13px;margin-bottom:7px;cursor:pointer;user-select:none;-webkit-user-select:none;box-shadow:0 2px 8px rgba(120,90,40,0.05);}
.sheet-folder-chevron{font-size:11px;color:var(--tx2);transition:transform .2s;flex-shrink:0;}
.sheet-folder-header.open .sheet-folder-chevron{transform:rotate(90deg);}
.sheet-folder-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;}
.sheet-folder-name{flex:1;font-size:15px;font-weight:700;color:var(--tx);}
.sheet-folder-count{font-size:12px;color:var(--tx2);background:#F1EADD;border-radius:100px;padding:2px 9px;font-weight:600;}
.meal-pick-row{display:flex;align-items:center;gap:12px;padding:12px 14px;margin:0 0 7px 14px;background:var(--card);border-radius:12px;box-shadow:0 2px 8px rgba(120,90,40,0.04);cursor:pointer;}
.pick-checkbox{width:23px;height:23px;border-radius:50%;border:1.5px solid #D8CFBE;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pick-checkbox.checked{background:var(--pri);border-color:var(--pri);}
.pick-checkbox.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:800;}
.pick-checkbox.second-checked{background:#E0A56B;border-color:#E0A56B;}
.pick-checkbox.second-checked::after{content:'✓';color:#fff;font-size:12px;font-weight:800;}
.pick-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pick-name{font-size:15px;font-weight:600;color:var(--tx);flex:1;min-width:0;}
.pick-folder{font-size:11px;color:var(--tx3);}
.pick-limit-hint{font-size:12px;color:#B5611F;background:#FCEEDA;border-radius:9px;padding:8px 12px;margin:2px 0 10px;}
.clear-row{display:flex;align-items:center;gap:9px;padding:15px 4px 6px;cursor:pointer;color:var(--tx3);font-size:14px;font-weight:600;}

/* ── Shopping list ── */
.toolbar{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 12px;}
.count-txt{font-size:13px;font-weight:600;color:var(--tx2);}
.toggle-checked{font-size:12px;font-weight:600;color:var(--tx2);background:#F1EADD;padding:6px 12px;border-radius:100px;border:none;font-family:inherit;cursor:pointer;}
.sl-cat{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:0.07em;padding:14px 6px 8px;display:flex;align-items:center;gap:7px;}
.sl-cat:first-child{padding-top:2px;}
.list-card{background:var(--card);border-radius:16px;padding:5px 4px;box-shadow:0 2px 10px rgba(120,90,40,0.05);}
.sl-item{display:flex;align-items:center;gap:12px;padding:12px 13px;border-bottom:1px solid var(--line);}
.sl-item:last-child{border-bottom:none;}
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid #D2C8B5;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.check-circle svg{width:11px;height:9px;stroke:#fff;stroke-width:2.6;fill:none;display:none;}
.sl-item.checked .check-circle{background:var(--pri);border-color:var(--pri);}
.sl-item.checked .check-circle svg{display:block;}
.sl-name{flex:1;min-width:0;font-size:15px;font-weight:600;color:var(--tx);}
.sl-origin{font-size:11px;color:var(--tx3);font-weight:400;display:block;margin-top:2px;}
.sl-item.checked .sl-name{text-decoration:line-through;color:#B5A892;font-weight:500;}
.sl-qty{font-size:13px;color:var(--tx2);font-weight:600;background:var(--chip);border-radius:7px;padding:3px 9px;flex-shrink:0;}
.sl-item.checked .sl-qty{opacity:0.5;}
.sl-edit{color:#B5A892;display:flex;flex-shrink:0;padding:5px;cursor:pointer;}
.sl-edit svg{width:16px;height:16px;}
.edit-card{background:linear-gradient(135deg,#FDF4E7,#FBEAD6);border-radius:16px;padding:15px;margin:6px 2px;box-shadow:0 3px 14px rgba(197,140,70,0.12);}
.edit-lab{font-size:11px;font-weight:700;color:#9A8259;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.edit-lab.mt{margin-top:12px;}
.qrow{display:flex;gap:9px;align-items:stretch;}
.qrow .qnum{width:90px;flex-shrink:0;background:#fff;text-align:center;}
.qrow .qname{flex:1;min-width:0;background:#fff;}
.unit-chip{display:flex;align-items:center;padding:0 14px;background:#EFE4D0;border-radius:12px;font-size:14px;font-weight:700;color:#9A8259;flex-shrink:0;}
.edit-card select{background:#fff;margin-top:2px;}
.edit-actions{display:flex;gap:9px;margin-top:13px;}
.eb{padding:10px 14px;border-radius:12px;border:none;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.eb.ok{flex:1;background:var(--pri);color:#fff;box-shadow:0 3px 10px rgba(197,106,46,0.25);}
.eb.x{flex:0 0 44px;background:#ECDFC9;color:#9A8259;}
.eb.del{flex:0 0 44px;background:#FDECEA;color:#C0392B;font-size:16px;}
.hint-row{font-size:11px;color:var(--tx3);padding:9px 10px 2px;text-align:center;}
.add-form{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding:14px;background:var(--card);border-radius:16px;box-shadow:0 2px 10px rgba(120,90,40,0.05);align-items:center;}
.add-form .aq{width:72px;flex-shrink:0;text-align:center;}
.add-form select.au{flex:1;min-width:70px;flex-shrink:0;padding:11px 22px 11px 10px;font-size:13px;}
.add-form .add-row1{display:flex;gap:8px;width:100%;align-items:center;}
.add-form .add-row2{display:flex;gap:8px;width:100%;align-items:center;}
.add-form .an{flex:1;min-width:0;}
.add-form .aplus{width:42px;height:42px;flex-shrink:0;background:var(--pri);color:#fff;border:none;border-radius:11px;font-size:20px;cursor:pointer;}
.actions-bar{display:flex;gap:8px;margin-top:14px;}
.act{flex:1;padding:13px 6px;border-radius:13px;font-size:13px;font-weight:700;font-family:inherit;border:none;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;}
.act.clear{background:var(--sec);color:var(--tx2);}
.act.share{background:var(--green);color:#fff;}
.act.merk{background:var(--card);color:var(--pri);box-shadow:0 2px 8px rgba(120,90,40,0.06);}
.act svg{width:14px;height:14px;}
.empty-state{text-align:center;padding:30px 16px;color:var(--tx3);font-size:14px;line-height:1.6;}

/* ── Category-assign banner ── */
#cat-assign-banner{background:linear-gradient(135deg,#FDF4E7,#FBEAD6);border-radius:18px;padding:16px 17px;margin-bottom:14px;box-shadow:0 3px 14px rgba(197,140,70,0.12);}
.cat-assign-top{display:flex;align-items:flex-start;gap:11px;}
.cat-assign-ic{width:30px;height:30px;border-radius:9px;background:#F6DCBB;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.cat-assign-header{font-size:14px;font-weight:700;color:var(--tx);}
.cat-assign-sub{font-size:11.5px;color:#9A8259;font-weight:500;display:block;margin-top:3px;line-height:1.4;}
.cat-assign-row{display:flex;align-items:center;gap:9px;margin-top:13px;}
.cat-assign-name{font-size:13px;color:#7A6A4E;font-weight:600;flex-shrink:0;}
.cat-assign-select{flex:1;min-width:120px;background:#fff;font-size:13px;}
.cat-assign-row .btn{padding:8px 12px;}

/* ── Recipes ── */
.top-actions{display:flex;gap:9px;margin-bottom:6px;}
.ta{flex:1;padding:13px;border-radius:13px;font-size:14px;font-weight:700;font-family:inherit;border:none;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;}
.ta.new{background:var(--pri);color:#fff;box-shadow:0 3px 10px rgba(197,106,46,0.25);}
.ta.merk{background:var(--card);color:var(--pri);box-shadow:0 2px 8px rgba(120,90,40,0.06);}
.folder-header{display:flex;align-items:center;gap:11px;padding:14px 15px;background:var(--card);border-radius:14px;margin-bottom:8px;cursor:pointer;user-select:none;-webkit-user-select:none;box-shadow:0 2px 9px rgba(120,90,40,0.05);}
.folder-chevron{font-size:11px;color:var(--tx2);transition:transform .2s;flex-shrink:0;}
.folder-header.open .folder-chevron{transform:rotate(90deg);}
.folder-dot{width:15px;height:15px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,0.18);cursor:pointer;}
.folder-name{flex:1;font-size:15px;font-weight:700;color:var(--tx);}
.folder-count{font-size:12px;color:var(--tx2);background:#F1EADD;border-radius:100px;padding:2px 9px;font-weight:600;}
.db-folder-section{margin-bottom:2px;}
.recipe{background:var(--card);border-radius:13px;padding:13px 15px;margin:0 0 7px 14px;box-shadow:0 2px 8px rgba(120,90,40,0.04);display:flex;align-items:center;gap:12px;}
.recipe-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.recipe-body{flex:1;min-width:0;}
.recipe-name{font-size:15px;font-weight:700;color:var(--tx);}
.recipe-meta{font-size:12px;color:var(--tx3);margin-top:3px;}
.recipe-acts{display:flex;align-items:center;gap:2px;flex-shrink:0;}
.ribtn{color:#B5A892;display:flex;padding:7px;border-radius:9px;cursor:pointer;background:none;border:none;}
.ribtn svg{width:17px;height:17px;}
.ribtn.del{color:#C99A8E;}
.recipe-form-card{background:var(--card);border-radius:18px;padding:17px;margin-bottom:14px;box-shadow:0 2px 10px rgba(120,90,40,0.05);}
.form-label{font-size:11px;font-weight:700;color:#9A8259;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:7px;display:block;}
.form-label.mt{margin-top:16px;}
.col-header{display:flex;gap:8px;padding:0 2px 6px;}
.col-header span{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.04em;font-weight:700;}
.col-header .c1{width:74px;}.col-header .c2{width:78px;}.col-header .c3{flex:1;}
.ing-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.ing-row .amt{width:74px;flex-shrink:0;background:var(--fill);border:none;border-radius:11px;padding:11px 8px;font-size:14px;text-align:center;font-family:inherit;color:var(--tx);}
.ing-row select.unit{width:78px;flex-shrink:0;padding:11px 22px 11px 9px;font-size:13px;border-radius:11px;}
.ing-row .ingname{flex:1;min-width:0;background:var(--fill);border:none;border-radius:11px;padding:11px 12px;font-size:14px;font-family:inherit;color:var(--tx);}
.ing-list{margin-bottom:6px;}
.adding-btn{background:none;border:none;color:var(--pri);font-size:14px;font-weight:700;font-family:inherit;padding:8px 2px;cursor:pointer;}
.divider{border:none;border-top:1px solid var(--line);margin:16px 0;}

/* ── Recolor popover ── */
.recolor-pop{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(340px,calc(100vw - 40px));background:var(--card);border-radius:18px;padding:18px;box-shadow:0 16px 44px rgba(60,40,15,0.3);z-index:300;display:none;}
.recolor-pop.open{display:block;}
.recolor-scrim{position:fixed;inset:0;background:rgba(45,30,15,0.32);z-index:299;display:none;}
.recolor-scrim.open{display:block;}
.recolor-t{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:3px;}
.recolor-s{font-size:11px;color:var(--tx3);margin-bottom:14px;}
.recolor-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:11px;}
.recolor-grid i{width:100%;aspect-ratio:1;border-radius:50%;box-shadow:0 1px 2px rgba(0,0,0,0.15);cursor:pointer;}
.recolor-grid i.cur{box-shadow:0 0 0 3px var(--tx);}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:11px 20px;border-radius:100px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* ── Autocomplete ── */
.ac-dropdown{position:absolute;background:var(--card);border-radius:13px;box-shadow:0 10px 30px rgba(60,40,15,0.2);z-index:9999;overflow:hidden;}
.ac-item{padding:11px 14px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--line);}
.ac-item:last-child{border-bottom:none;}
.ac-item.ac-sel{background:#FCF6EE;}
.ac-item.ac-recipe{background:#FCF6EE;}
.ac-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tx);font-weight:500;}
.ac-match{color:var(--pri);font-weight:800;}
.ac-cat{font-size:11px;color:var(--tx3);flex-shrink:0;}
.ac-recipe-badge{font-size:11px;color:var(--pri);flex-shrink:0;font-weight:700;}

// ── Push Notifications ────────────────────────────────────────────────────────
function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

function updateBellIcon() {
  const btn = document.getElementById('bell-btn');
  if (!btn) return;
  if (!('Notification' in window) || !('PushManager' in window)) {
    btn.classList.add('unsupported'); return;
  }
  const perm = Notification.permission;
  btn.classList.toggle('enabled', perm === 'granted');
  btn.title = perm === 'granted' ? 'Benachrichtigungen aktiv' : 'Benachrichtigungen aktivieren';
}

async function registerPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window) || !db) return;
  try {
    const sw = await navigator.serviceWorker.ready;
    let sub = await sw.pushManager.getSubscription();
    if (!sub) {
      sub = await sw.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    await db.ref('push/' + deviceId).set({ subscription: sub.toJSON(), lastSeen: Date.now() });
    updateBellIcon();
  } catch(e) { console.warn('Push-Registrierung fehlgeschlagen:', e); }
}

async function onBellClick() {
  if (!('Notification' in window) || !('PushManager' in window)) {
    showToast('Push-Benachrichtigungen werden von diesem Browser nicht unterstützt.'); return;
  }
  if (Notification.permission === 'denied') {
    showToast('Benachrichtigungen sind blockiert. Bitte in den Browser-Einstellungen erlauben.'); return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') { await registerPush(); showToast('Benachrichtigungen aktiviert ✓'); }
  else { showToast('Benachrichtigungen nicht erlaubt.'); }
}

function sendPushToOthers() {
  _visibilityTimer = null;
  if (!deviceId || PUSH_ENDPOINT.includes('YOUR_VERCEL')) return;
  if (!_mealsChanged && !_shoppingChanged) return;
  const msg = (_mealsChanged && _shoppingChanged)
    ? 'Mahlzeiten & Einkaufsliste wurden geändert.'
    : _mealsChanged ? 'Mahlzeitenplanung wurde geändert.'
    : 'Einkaufsliste wurde geändert.';
  _mealsChanged = false; _shoppingChanged = false;
  const pushData = _pushCache;
  if (!pushData) return;
  let sent = 0;
  for (const [did, info] of Object.entries(pushData)) {
    if (did === deviceId || !info.subscription) continue;
    sent++;
    fetch(PUSH_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subscription: info.subscription, message: msg }),
      keepalive: true
    }).catch(() => {});
  }

}

// ── Helpers ───────────────────────────────────────────────────────────────────
function categorize(name){
  const n=name.toLowerCase();
  const nk=normalizeKey(name);
  if(customCategories[nk]) return customCategories[nk];
  for(const cat of CATEGORIES){ if(cat.name==="Sonstiges")continue; for(const kw of cat.keywords){ if(n.includes(kw))return cat.name; } }
  return "Sonstiges";
}
function catIcon(name){ const c=CATEGORIES.find(c=>c.name===name); return c?c.icon:'📦'; }
function checkSonstiges(name){
  if(!name||!name.trim()) return;
  if(categorize(name)!=='Sonstiges') return;
  const nk=normalizeKey(name);
  if(pendingCategoryChecks.find(p=>p.nk===nk)) return;
  pendingCategoryChecks.push({name:name.trim(), nk});
  renderCategoryBanner();
}
function doAssignCategory(i){
  const p=pendingCategoryChecks[i]; if(!p) return;
  const sel=document.getElementById('catsel-'+i); if(!sel||!sel.value) return;
  customCategories[p.nk]=sel.value;
  pendingCategoryChecks.splice(i,1);
  currentList=sortByCategory(currentList);
  saveState(); renderShoppingList(); renderCategoryBanner();
}
function dismissCategoryCheck(i){
  pendingCategoryChecks.splice(i,1); renderCategoryBanner();
}
function renderCategoryBanner(){
  const el=document.getElementById('cat-assign-banner'); if(!el) return;
  if(!pendingCategoryChecks.length){ el.style.display='none'; return; }
  el.style.display='block';
  const opts=CATEGORIES.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
  el.innerHTML=`<div class="cat-assign-top"><div class="cat-assign-ic">📂</div><div><div class="cat-assign-header">Kategorie noch offen</div><span class="cat-assign-sub">Einmal zuordnen, dann dauerhaft auf allen Geräten gemerkt</span></div></div>`+
    pendingCategoryChecks.map((p,i)=>`<div class="cat-assign-row">
      <span class="cat-assign-name">„${p.name}"</span>
      <select id="catsel-${i}" class="cat-assign-select"><option value="">Kategorie wählen …</option>${opts}</select>
      <button class="btn primary sm" onclick="doAssignCategory(${i})">✓</button>
      <button class="btn sm" onclick="dismissCategoryCheck(${i})">✕</button>
    </div>`).join('');
}
function sortByCategory(list){
  const order=CATEGORIES.map(c=>c.name);
  return [...list].sort((a,b)=>{ const ca=order.indexOf(categorize(a.name)),cb=order.indexOf(categorize(b.name)); return ca!==cb?ca-cb:a.name.localeCompare(b.name,'de'); });
}
function ingToStr(i){ return [i.amt,i.unit,i.name].filter(Boolean).join(' ').trim(); }
function normalizeKey(name){ return name.toLowerCase().replace(/\s+/g,' ').replace(/en$/,'').replace(/n$/,'').replace(/e$/,'').trim(); }
function escAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

// ── Decimal-safe number parsing ───────────────────────────────────────────────
function parseAmt(str){
  if(str==null||str==='')return 0;
  return parseFloat(String(str).replace(',','.').trim())||0;
}
function parseQtyStr(s){
  const str=(s||'').trim();
  const amt=parseAmt(str);
  const unit=str.replace(/^[\d.,\s]+/,'').trim();
  return {amt,unit};
}
function fmtAmt(n){ return n%1===0?String(n):parseFloat(n.toFixed(3)).toString(); }

// ── Ingredient combining ──────────────────────────────────────────────────────
function combineIngredients(allIng){
  const groups={};
  allIng.forEach(({ingredient,meal})=>{
    const key=normalizeKey(ingredient.name);
    if(!groups[key])groups[key]={name:ingredient.name,amount:0,unit:ingredient.unit,meals:[],items:[]};
    groups[key].meals.push(meal); groups[key].items.push(ingredient);
    const amt=parseAmt(ingredient.amt);
    if(amt>0){
      if(groups[key].unit===ingredient.unit) groups[key].amount+=amt;
      else if(!groups[key].amount){ groups[key].amount=amt; groups[key].unit=ingredient.unit; }
    }
  });
  return Object.values(groups).map(g=>{
    let qty='';
    if(g.items.length===1){ qty=[g.items[0].amt,g.items[0].unit].filter(Boolean).join(' '); }
    else if(g.amount>0){ qty=fmtAmt(g.amount)+(g.unit?' '+g.unit:''); }
    return {id:nextItemId++,qty,name:g.name,meals:g.meals,combined:g.meals.length>1,manual:false,checked:false,dayContributions:{}};
  });
}

// ── Date helpers ──────────────────────────────────────────────────────────────
const TODAY=(()=>{ const d=new Date(); d.setHours(0,0,0,0); return d; })();
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function dateKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function get7Days(){ return Array.from({length:7},(_,i)=>addDays(TODAY,i)); }
function dateFromKey(dk){ return new Date(dk+'T00:00:00'); }
function isPastDk(dk){ return dateFromKey(dk)<TODAY; }
function dayLabelForDate(d){
  const diff=Math.round((d.getTime()-TODAY.getTime())/86400000);
  if(diff===0)return'Heute'; if(diff===1)return'Morgen'; if(diff===-1)return'Gestern';
  return['So','Mo','Di','Mi','Do','Fr','Sa'][d.getDay()];
}
function dayDateStr(d){ return d.toLocaleDateString('de-DE',{day:'numeric',month:'short'}); }
function dayNumStr(d){ return String(d.getDate()); }
function dayWdStr(d){ return ['So','Mo','Di','Mi','Do','Fr','Sa'][d.getDay()]; }

// ── Wochenplaner ──────────────────────────────────────────────────────────────
function renderWeekPlanner(){
  const card=document.getElementById('week-card');
  if(!card)return;

  const futureDays=get7Days();

  const pastDks=Object.keys(plannedDays)
    .filter(dk=>{ const p=plannedDays[dk]; return p&&isPastDk(dk)&&!p.eaten&&p.type==='meal'; })
    .sort();

  const mealCount=futureDays.reduce((s,d)=>{
    const p=plannedDays[dateKey(d)]; return s+(p&&p.type==='meal'&&p.meals?p.meals.length:0);
  },0);
  const sub=document.getElementById('week-subtitle');
  if(sub) sub.textContent=mealCount>0?`${mealCount} Gericht${mealCount!==1?'e':''} diese Woche geplant`:'Nächste 7 Tage';

  let html='';
  if(pastDks.length){
    html+=`<div class="week-section-header">Vergangene Tage</div>`;
    pastDks.forEach(dk=>{ html+=renderDayRowHtml(dk, dateFromKey(dk), true); });
    html+=`<div class="week-section-header">Diese Woche</div>`;
  }
  futureDays.forEach(date=>{ html+=renderDayRowHtml(dateKey(date), date, false); });
  card.innerHTML=html;

  attachDragHandlers();
}

  } else if(plan.type==='meal'){

    contentHtml=mls.length>0
      ? mls.map((m,mi)=>{
          const c=fColor(m.folder);
          const dot=c?`<div class="meal-dot" style="background:${c}"></div>`:`<div class="meal-dot" style="background:transparent;width:0;margin:0"></div>`;
          return `<div class="meal-line${mi>0?' second':''}">${dot}<div class="meal-name-text">${escHtml(m.name)}</div></div>`;
        }).join('')
      : `<div class="day-empty">Tippen zum Bearbeiten</div>`;
  } else {
    const sp=SPECIAL.find(s=>s.key===plan.type);

  } else if(isPast){
    actionHtml=`<button class="btn-eaten" onclick="event.stopPropagation();markEaten('${dk}')">Gegessen ✓</button>`;
  } else if(plan.type==='meal'){
    const mls=plan.meals||[];

    if(mls.length>0){
      listBtn=plan.inList
        ?`<button class="btn-list-action in-list" onclick="event.stopPropagation();removeDayFromList('${dk}')">− Liste</button>`
        :`<button class="btn-list-action" onclick="event.stopPropagation();addDayToList('${dk}')">+ Liste</button>`;
    }
    const rightBtn=isToday
      ?`<button class="btn-eaten" onclick="event.stopPropagation();markEaten('${dk}')">Gegessen ✓</button>`
      :`<button class="btn-remove" onclick="event.stopPropagation();clearDay('${dk}')">×</button>`;
    actionHtml=`<div class="day-actions-col">${listBtn}${rightBtn}</div>`;
  } else {
    actionHtml=`<div class="day-actions-col"><button class="btn-remove" onclick="event.stopPropagation();clearDay('${dk}')">×</button></div>`;
  }

  const handleHtml=`<div class="drag-handle" data-handle-dk="${dk}"><svg viewBox="0 0 20 20" fill="currentColor"><circle cx="7" cy="5" r="1.4"/><circle cx="13" cy="5" r="1.4"/><circle cx="7" cy="10" r="1.4"/><circle cx="13" cy="10" r="1.4"/><circle cx="7" cy="15" r="1.4"/><circle cx="13" cy="15" r="1.4"/></svg></div>`;

  return `<div class="day-row ${rowCls}" data-dk="${dk}">

function markEaten(dk){

// ── Drag & Drop ───────────────────────────────────────────────────────────────
let _dragSrc=null, _dragOver=null, _isDragging=false;
let _ghost=null, _longTimer=null, _lpFired=false;
let _tx=0, _ty=0, _ghostOffY=0;

function attachDragHandlers(){
  document.querySelectorAll('.day-row').forEach(row=>{
    const dk=row.dataset.dk;
    if(!dk)return;
    row.draggable=true;
    row.addEventListener('dragstart', e=>{ _dragSrc=dk; e.dataTransfer.effectAllowed='move'; setTimeout(()=>row.style.opacity='0.4',0); });
    row.addEventListener('dragend',   ()=>{ row.style.opacity=''; _clearDragUI(); });
    row.addEventListener('dragover',  e=>{ e.preventDefault(); _highlightRow(dk,row); });
    row.addEventListener('dragleave', ()=>row.classList.remove('drag-over'));
    row.addEventListener('drop',      e=>{ e.preventDefault(); _doSwap(dk); });
  });
  document.querySelectorAll('.drag-handle').forEach(handle=>{
    const dk=handle.dataset.handleDk;
    if(!dk)return;
    handle.addEventListener('touchstart', e=>_onTS(e,dk), {passive:false});
    handle.addEventListener('touchmove',  e=>_onTM(e),    {passive:false});
    handle.addEventListener('touchend',   e=>_onTE(e),    {passive:false});
    handle.addEventListener('touchcancel',()=>_endDrag(),  {passive:false});
  });
}

function _highlightRow(dk, row){
  document.querySelectorAll('.day-row.drag-over').forEach(r=>r.classList.remove('drag-over'));
  _dragOver=dk;
  if(dk!==_dragSrc) row.classList.add('drag-over');
}
function _clearDragUI(){
  document.querySelectorAll('.day-row.drag-over').forEach(r=>r.classList.remove('drag-over'));
  _dragSrc=null; _dragOver=null;
}

function _onTS(e,dk){
  const t=e.touches[0]; _tx=t.clientX; _ty=t.clientY; _dragSrc=dk; _lpFired=false;
  _longTimer=setTimeout(()=>{
    _lpFired=true;
    const row=document.querySelector(`.day-row[data-dk="${dk}"]`);
    if(row){ const rect=row.getBoundingClientRect(); _ghostOffY=t.clientY-rect.top; _startGhost(row,t.clientY); }
    if(navigator.vibrate)navigator.vibrate(40);
  },300);
}
function _onTM(e){
  if(!_lpFired){
    const t=e.touches[0];
    if(Math.abs(t.clientX-_tx)>8||Math.abs(t.clientY-_ty)>8) clearTimeout(_longTimer);
    return;
  }
  e.preventDefault();
  const t=e.touches[0];
  if(_ghost) _ghost.style.top=Math.max(0,t.clientY-_ghostOffY)+'px';
  if(_ghost) _ghost.style.display='none';
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(_ghost) _ghost.style.display='';
  const targetRow=el&&el.closest('.day-row');
  document.querySelectorAll('.day-row.drag-over').forEach(r=>r.classList.remove('drag-over'));
  if(targetRow){ _dragOver=targetRow.dataset.dk; if(_dragOver!==_dragSrc)targetRow.classList.add('drag-over'); }
  else _dragOver=null;
}
function _onTE(e){
  clearTimeout(_longTimer);
  if(_lpFired&&_dragSrc&&_dragOver&&_dragSrc!==_dragOver) _doSwap(_dragOver);
  else _endDrag();
}
function _startGhost(row, clientY){
  _isDragging=true;
  _ghost=row.cloneNode(true);
  _ghost.classList.add('drag-ghost');
  _ghost.style.top=(clientY-_ghostOffY)+'px';
  _ghost.style.height=row.offsetHeight+'px';
  document.body.appendChild(_ghost);
  row.style.opacity='0.35';
}
function _endDrag(){
  _isDragging=false; _lpFired=false;
  if(_ghost){ _ghost.remove(); _ghost=null; }
  document.querySelectorAll('.day-row').forEach(r=>{ r.classList.remove('drag-over'); r.style.opacity=''; });
  _dragSrc=null; _dragOver=null;
}
function _doSwap(targetDk){
  if(!_dragSrc||targetDk===_dragSrc){ _endDrag(); return; }
  const srcPlan=plannedDays[_dragSrc]?{...plannedDays[_dragSrc]}:null;
  const tgtPlan=plannedDays[targetDk]?{...plannedDays[targetDk]}:null;
  if(srcPlan) srcPlan.eaten=false;
  if(tgtPlan) tgtPlan.eaten=false;
  currentList.forEach(item=>{
    if(!item.dayContributions) return;
    const sc=item.dayContributions[_dragSrc];
    const tc=item.dayContributions[targetDk];
    if(sc) item.dayContributions[targetDk]=sc; else delete item.dayContributions[targetDk];
    if(tc) item.dayContributions[_dragSrc]=tc; else delete item.dayContributions[_dragSrc];
  });
  if(srcPlan) plannedDays[targetDk]=srcPlan; else delete plannedDays[targetDk];
  if(tgtPlan) plannedDays[_dragSrc]=tgtPlan; else delete plannedDays[_dragSrc];
  _endDrag();
  saveState(); renderWeekPlanner(); renderShoppingList(); updateBadge();
  showToast('Tag verschoben ✓');
}

// ── Day sheet ─────────────────────────────────────────────────────────────────
function openDaySheet(dk){
  openDateKey=dk;
  const date=dateFromKey(dk);
  const diff=Math.round((date.getTime()-TODAY.getTime())/86400000);
  let title;
  if(diff===0) title='Heute';
  else if(diff===1) title='Morgen';
  else if(diff===-1) title='Gestern';
  else title=dayLabelForDate(date)+', '+dayDateStr(date);
  document.getElementById('sheet-title').textContent='Mahlzeit wählen';
  document.getElementById('sheet-subtitle').textContent=title;
  sheetCollapsedFolders={};
  renderSheetBody(dk);
  document.getElementById('day-overlay').classList.add('open');
}

function toggleSheetFolder(key){
  sheetCollapsedFolders[key]=(sheetCollapsedFolders[key]===false)?true:false;
  renderSheetBody(openDateKey);
}

function renderSheetBody(dk){
  const plan=plannedDays[dk];
  const selectedMeals=(plan&&!plan.eaten&&plan.type==='meal'&&plan.meals)?plan.meals:[];
  const selectedIds=selectedMeals.map(m=>m.mealId);
  const atMax=selectedIds.length>=2;

  const confirmBtn=document.getElementById('btn-confirm');
  if(confirmBtn){
    const n=selectedIds.length;
    confirmBtn.textContent=n===0?'Übernehmen':n===1?'1 Gericht übernehmen':'2 Gerichte übernehmen';
  }

  let html=`<div class="sheet-section-label">Sonderoptionen</div>`;
  SPECIAL.forEach(sp=>{
    const sel=plan&&plan.type===sp.key;
    html+=`<button class="special-btn${sel?' selected':''}" onclick="pickSpecial('${sp.key}')">
      <span class="special-icon">${sp.icon}</span>
      <div><div class="special-label">${sp.label}</div><div class="special-sub">${sp.sub}</div></div>
      ${sel?'<span class="special-check">✓</span>':''}
    </button>`;
  });

  html+=`<div class="sheet-section-label">Rezepte</div>`;
  if(atMax) html+=`<div class="pick-limit-hint">Maximal 2 Gerichte – ein Gericht abwählen um ein anderes zu wählen.</div>`;
  if(!meals.length){ html+=`<div class="empty-state">Noch keine Rezepte vorhanden.</div>`; }

  const grouped={}, NO_FOLDER='__none__';
  meals.forEach(m=>{ const k=(m.folder||'').trim()||NO_FOLDER; if(!grouped[k])grouped[k]=[]; grouped[k].push(m); });
  const keys=Object.keys(grouped).sort((a,b)=>{ if(a===NO_FOLDER)return 1; if(b===NO_FOLDER)return -1; return a.localeCompare(b,'de'); });

  keys.forEach(key=>{
    const folderMeals=grouped[key];
    if(key===NO_FOLDER){
      folderMeals.forEach(m=>{ html+=mealPickRowHtml(m, selectedIds, atMax); });
    } else {
      const safeKey=key.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const isOpen=(sheetCollapsedFolders[key]===false);
      const c=fColor(key);
      html+=`<div class="sheet-folder-header${isOpen?' open':''}" onclick="toggleSheetFolder('${safeKey}')">
        <span class="sheet-folder-chevron">▶</span>
        <span class="sheet-folder-dot" style="background:${c}"></span>
        <span class="sheet-folder-name">${escHtml(key)}</span>
        <span class="sheet-folder-count">${folderMeals.length}</span>
      </div>`;
      if(isOpen){
        folderMeals.forEach(m=>{ html+=mealPickRowHtml(m, selectedIds, atMax); });
      }
    }
  });

  if(plan){
    html+=`<div class="clear-row" onclick="pickClear()"><span>↩</span><span>Eintrag entfernen</span></div>`;
  }
  document.getElementById('sheet-body').innerHTML=html;
}

function mealPickRowHtml(m, selectedIds, atMax){
  const pos=selectedIds.indexOf(m.id);
  const isFirst=pos===0, isSecond=pos===1, isSelected=pos>=0;
  const isDisabled=atMax&&!isSelected;
  const subLabel=isSecond?'2. Gericht':isFirst&&selectedIds.length>1?'1. Gericht':'';
  const c=fColor(m.folder);
  const dot=c?`<span class="pick-dot" style="background:${c}"></span>`:'';
  return `<div class="meal-pick-row" onclick="${isDisabled?'':'pickMeal('+m.id+')'}" style="${isDisabled?'opacity:0.35':''}">
    <div class="pick-checkbox${isFirst?' checked':isSecond?' second-checked':''}"></div>
    ${dot}
    <div class="pick-name">${escHtml(m.name)}</div>
    ${subLabel?`<span class="pick-folder">${subLabel}</span>`:''}
  </div>`;
}

function pickMeal(mealId){
  const plan=plannedDays[openDateKey];
  const current=(plan&&plan.type==='meal'&&plan.meals)?[...plan.meals]:[];
  const idx=current.findIndex(m=>m.mealId===mealId);
  if(idx>=0){
    current.splice(idx,1);
    if(current.length===0) delete plannedDays[openDateKey];
    else plannedDays[openDateKey]={...plan,meals:current};
  } else if(current.length<2){
    const m=meals.find(x=>x.id===mealId);
    current.push({mealId,name:m.name,folder:m.folder||''});
    plannedDays[openDateKey]={type:'meal',meals:current,inList:(plan&&plan.inList)||false};
  }

function _removeDayContributions(dk){
  currentList=currentList.filter(item=>{
    if(!item.dayContributions||!item.dayContributions[dk])return true;
    const contrib=item.dayContributions[dk];
    delete item.dayContributions[dk];
    const {amt:existAmt,unit:existUnit}=parseQtyStr(item.qty);
    if(contrib.qty>0&&existAmt>0&&contrib.unit===existUnit){
      const newAmt=existAmt-contrib.qty;
      const hasOther=Object.keys(item.dayContributions).length>0;
      if(newAmt<=0&&!hasOther&&!item.manual)return false;
      if(newAmt>0) item.qty=fmtAmt(newAmt)+(existUnit?' '+existUnit:'');
      else if(!hasOther&&!item.manual)return false;
    } else {
      const hasOther=Object.keys(item.dayContributions).length>0;
      if(!hasOther&&!item.manual&&!existAmt)return false;
    }
    if(contrib.meals){ contrib.meals.forEach(mn=>{ const i=item.meals.indexOf(mn); if(i>=0)item.meals.splice(i,1); }); }
    item.combined=item.meals.length>1;
    return true;
  });
}

function addDayToList(dk){
  _mealsChanged=true; _shoppingChanged=true;
  const plan=plannedDays[dk];
  if(!plan||plan.type!=='meal'||!plan.meals||plan.meals.length===0)return;
  const allIng=[];
  plan.meals.forEach(pm=>{ const m=meals.find(x=>x.id===pm.mealId); if(!m)return; m.ingredients.forEach(ing=>allIng.push({ingredient:ing,meal:m.name})); });
  const dayItems=combineIngredients(allIng);
  dayItems.forEach(newItem=>{
    const key=normalizeKey(newItem.name);
    const existing=currentList.find(e=>normalizeKey(e.name)===key);
    const {amt:newAmt,unit:newUnit}=parseQtyStr(newItem.qty);
    if(existing){
      const {amt:existAmt,unit:existUnit}=parseQtyStr(existing.qty);
      if(newAmt>0&&existAmt>0&&newUnit===existUnit){
        const sum=newAmt+existAmt;
        existing.qty=fmtAmt(sum)+(existUnit?' '+existUnit:'');
      }
      newItem.meals.forEach(mn=>{ if(!existing.meals.includes(mn))existing.meals.push(mn); });
      existing.combined=existing.meals.length>1;
      if(!existing.dayContributions)existing.dayContributions={};
      existing.dayContributions[dk]={qty:newAmt,unit:newUnit,meals:newItem.meals};
    } else {
      newItem.dayContributions={[dk]:{qty:newAmt,unit:newUnit,meals:newItem.meals}};
      currentList.push(newItem);
    }
  });
  currentList=sortByCategory(currentList);
  plan.inList=true;
  saveState(); renderWeekPlanner(); renderShoppingList(); updateBadge();
  showToast('Zur Einkaufsliste hinzugefügt ✓');
}

function removeDayFromList(dk){
  _mealsChanged=true; _shoppingChanged=true;
  _removeDayContributions(dk);
  if(plannedDays[dk]) plannedDays[dk].inList=false;
  saveState(); renderWeekPlanner(); renderShoppingList(); updateBadge();
  showToast('Vom Tag entfernt');
}

function renderQuickBuySheet(){
  const catOrder=CATEGORIES.map(c=>c.name);
  const groups={};
  quickItems.forEach(item=>{ const cat=categorize(item.name); if(!groups[cat])groups[cat]=[]; groups[cat].push(item); });
  const sortedCats=Object.keys(groups).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b));
  const n=_selectedQuickIds.size;
  document.getElementById('quickbuy-sub').textContent=n?`${n} ausgewählt`:'Artikel auswählen';
  const cb=document.getElementById('quickbuy-confirm');
  cb.textContent=n?`${n} Artikel zur Liste hinzufügen`:'Zur Liste hinzufügen';
  document.getElementById('quickbuy-body').innerHTML=sortedCats.map(cat=>{
    const items=groups[cat];
    return `<div class="sheet-section-label">${catIcon(cat)} ${cat}</div>`+
      items.map(item=>{
        const sel=_selectedQuickIds.has(item.id);
        return `<div class="meal-pick-row" onclick="toggleQuickItem(${item.id})">
          <div class="pick-checkbox${sel?' checked':''}"></div>
          <div class="pick-name">${escHtml(item.name)}</div>
        </div>`;
      }).join('');
  }).join('');
}
function toggleQuickItem(id){
  if(_selectedQuickIds.has(id)) _selectedQuickIds.delete(id); else _selectedQuickIds.add(id);
  renderQuickBuySheet();
}
function addSelectedQuickItems(){
  if(!_selectedQuickIds.size){ showToast('Bitte mindestens einen Artikel auswählen.'); return; }
  _shoppingChanged=true;
  const count=_selectedQuickIds.size;
  closeQuickBuySheet();
  quickItems.filter(i=>_selectedQuickIds.has(i.id)).forEach(item=>{
    const exists=currentList.find(i=>!i.checked&&normalizeKey(i.name)===normalizeKey(item.name));
    if(!exists) currentList.push({id:nextItemId++,qty:item.qty||'',name:item.name,meals:[],combined:false,manual:true,checked:false,dayContributions:{}});
  });
  currentList=sortByCategory(currentList);
  saveState(); updateBadge(); renderShoppingList();
  showToast(count+' Artikel hinzugefügt ✓');
}

// ── Autocomplete ──────────────────────────────────────────────────────────────
let _acTarget = null, _acIdx = -1, _acPickPending = false, _acBlurTimer = null;

function acSuggestions(q) {
  q = q.trim().toLowerCase();
  if (!q) return [];
  const seen = new Set(), results = [];
  const add = (name, source) => {
    const k = normalizeKey(name);
    if (seen.has(k)) return;
    seen.add(k);
    results.push({ name, source });
  };
  meals.forEach(m => m.ingredients.forEach(i => { if (i.name) add(i.name, 'recipe'); }));
  currentList.forEach(i => { if (i.name) add(i.name, 'list'); });
  quickItems.forEach(i => { if (i.name) add(i.name, 'list'); });
  CATEGORIES.forEach(cat => cat.keywords.forEach(kw => {
    add(kw.charAt(0).toUpperCase() + kw.slice(1), 'keyword');
  }));
  results.forEach(r => { r.cat = categorize(r.name); });
  const starts = results.filter(r => r.name.toLowerCase().startsWith(q));
  const contains = results.filter(r => !r.name.toLowerCase().startsWith(q) && r.name.toLowerCase().includes(q));
  return [...starts, ...contains].slice(0, 6);
}

function acSearch(input) {
  clearTimeout(_acBlurTimer);
  _acTarget = input;
  const q = input.value;
  const items = acSuggestions(q);
  const dd = document.getElementById('ac-dropdown');
  if (!items.length || !q.trim()) { acClose(); return; }
  const qLo = q.trim().toLowerCase();
  dd.innerHTML = items.map((item) => {
    const lo = item.name.toLowerCase();
    const qi = lo.indexOf(qLo);
    const hl = qi >= 0
      ? escHtml(item.name.slice(0,qi)) + '<span class="ac-match">' + escHtml(item.name.slice(qi, qi+qLo.length)) + '</span>' + escHtml(item.name.slice(qi+qLo.length))
      : escHtml(item.name);
    const isRecipe = item.source === 'recipe';
    const badge = isRecipe
      ? `<span class="ac-recipe-badge">★ Rezept</span>`
      : `<span class="ac-cat">${item.cat}</span>`;
    return `<div class="ac-item${isRecipe?' ac-recipe':''}" data-name="${escAttr(item.name)}" onmousedown="acMouseDown(event)" ontouchstart="acTouchStart(event)"><span class="ac-name">${hl}</span>${badge}</div>`;
  }).join('');
  _acIdx = -1;
  if (dd.parentNode !== document.body) document.body.appendChild(dd);
  const rect = input.getBoundingClientRect();
  const sy = window.pageYOffset || document.documentElement.scrollTop;
  const sx = window.pageXOffset || document.documentElement.scrollLeft;
  const acMinW = Math.max(rect.width, 260);
  const acLeft = Math.min(rect.left + sx, window.innerWidth + sx - acMinW - 8);
  dd.style.display = 'block';
  dd.style.left = acLeft + 'px';
  dd.style.width = acMinW + 'px';
  dd.style.top = (rect.bottom + sy + 4) + 'px';
}

function acMouseDown(e) {
  e.preventDefault();
  const name = e.currentTarget.dataset.name;
  if (_acTarget) { _acTarget.value = name; _acTarget.dispatchEvent(new Event('input')); }
  acClose();
}

function acTouchStart(e) {
  _acPickPending = true;
  const name = e.currentTarget.dataset.name;
  setTimeout(() => {
    if (!_acPickPending) return;
    _acPickPending = false;
    if (_acTarget) { _acTarget.value = name; _acTarget.dispatchEvent(new Event('input')); _acTarget.focus(); }
    acClose();
  }, 0);
}

function acBlur() {
  _acBlurTimer = setTimeout(() => { if (!_acPickPending) acClose(); }, 200);
}

function acClose() {
  clearTimeout(_acBlurTimer);
  _acPickPending = false;
  const dd = document.getElementById('ac-dropdown');
  if (dd) { dd.style.display = 'none'; dd.innerHTML = ''; }
  _acIdx = -1;
}

function acKey(e, input) {
  const dd = document.getElementById('ac-dropdown');
  if (!dd || dd.style.display === 'none') return;
  const items = dd.querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _acIdx = Math.min(_acIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _acIdx = Math.max(_acIdx - 1, -1);
  } else if (e.key === 'Enter' && _acIdx >= 0) {
    e.preventDefault();
    const name = items[_acIdx].dataset.name;
    if (input) { input.value = name; input.dispatchEvent(new Event('input')); }
    acClose(); return;
  } else if (e.key === 'Escape') {
    acClose(); return;
  } else { return; }
  items.forEach((el, i) => el.classList.toggle('ac-sel', i === _acIdx));
}

// ── Tab navigation ────────────────────────────────────────────────────────────
function showTab(tab){
  ['planner','list','db'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'block':'none');
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['planner','list','db'][i]===tab));
  if(tab==='db'){ renderDbList(); document.getElementById('db-view').style.display='block'; document.getElementById('db-form').style.display='none'; document.getElementById('db-quickform').style.display='none'; }
  if(tab==='list'){ cleanupCheckedItems(); renderShoppingList(); }
}

// ── Service Worker ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
      .then(() => {
        if(Notification.permission === 'granted') registerPush();
      })
      .catch(()=>{});
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(!refreshing){ refreshing=true; window.location.reload(); }
    });
  });
}

// ── Sichtbarkeits-Listener: Push senden wenn App im Hintergrund ──
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (_mealsChanged || _shoppingChanged) {
      clearTimeout(_visibilityTimer); _visibilityTimer = null;
      sendPushToOthers();
    }
  } else {
    clearTimeout(_visibilityTimer); _visibilityTimer = null;
  }
});
window.addEventListener('pagehide', () => {
  if (_mealsChanged || _shoppingChanged) sendPushToOthers();
});

// ── Autocomplete Event Delegation ────────────────────────────────────────────
const AC_SELECTOR = '#new-name, #quick-new-name, .ingname';
document.addEventListener('input', e => {
  if (e.target.matches(AC_SELECTOR)) acSearch(e.target);
});
document.addEventListener('focusin', e => {
  if (e.target.matches(AC_SELECTOR)) acSearch(e.target);
});
document.addEventListener('focusout', e => {
  if (e.target.matches(AC_SELECTOR)) acBlur();
});

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('version-label').textContent=APP_VERSION;
updateBellIcon();
ensureFolderColors();
cleanupCheckedItems();
setInterval(cleanupCheckedItems, 5*60*1000);
renderWeekPlanner();
renderShoppingList();
updateBadge();
initSync();
</script>
